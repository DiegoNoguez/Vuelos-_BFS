<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuelos BFS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-white">

<main class="w-screen min-h-screen flex flex-col items-center p-6 gap-8">

    <!--  FORMULARIO -->
    <section class="w-full max-w-xl">
        <h1 class="text-3xl font-bold text-purple-700 mb-4">
            Buscar ruta BFS
        </h1>

        <form id="formulario" class="grid gap-4">

            <div class="flex flex-col">
                <label class="text-emerald-700 font-semibold">Estado inicial</label>
                <input type="text" id="inicio" required
                    class="border border-gray-400 rounded px-3 py-2 shadow focus:border-purple-400 outline-none"
                >
            </div>

            <div class="flex flex-col">
                <label class="text-emerald-700 font-semibold">Destino</label>
                <input type="text" id="destino" required
                    class="border border-gray-400 rounded px-3 py-2 shadow focus:border-purple-400 outline-none"
                >
            </div>

            <button type="submit"
                class="bg-purple-700 text-white font-bold py-2 rounded shadow hover:bg-emerald-600 transition">
                Buscar ruta
            </button>
        </form>

        <!-- Resultado -->
        <div class="mt-4">
            <h3 class="text-lg font-bold text-purple-700">Resultado:</h3>
            <p id="resultado" class="text-emerald-700"></p>
        </div>
    </section>


    <!-- TABLA DE RUTAS -->
    <section class="w-full max-w-4xl">
        <h2 class="text-2xl font-bold text-purple-700 mb-4">
            Rutas disponibles
        </h2>

        <div class="overflow-auto">
            <table class="w-full border border-gray-300">
                <thead class="bg-purple-700 text-white">
                    <tr>
                        <th class="p-2 border">Ciudad</th>
                        <th class="p-2 border">Conecta con</th>
                    </tr>
                </thead>
                <tbody id="tabla-rutas" class="text-center">
                    <!-- JS llena esto -->
                </tbody>
            </table>
        </div>
    </section>

</main>

<!-- Config -->
<script src="js/config.js"></script>
<script src="js/index.js"></script>
</body>
</html>
